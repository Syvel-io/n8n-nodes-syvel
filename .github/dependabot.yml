version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      eslint:
        patterns:
          - "eslint*"
          - "eslint-plugin-*"
    commit-message:
      prefix: "⬆️"
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Paris
    commit-message:
      prefix: "👷"
    labels:
      - dependencies
      - ci
